<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'none';style-src 'unsafe-inline';script-src 'unsafe-inline'">
<title>LocalCoder</title>
<style>
/* ── VS Code theme bridge ── all colors come from VS Code's injected variables */
:root {
  --bg:    var(--vscode-sideBar-background, #1e1e1e);
  --bg2:   var(--vscode-editor-background, #252526);
  --bg3:   var(--vscode-input-background, #3c3c3c);
  --bg4:   var(--vscode-list-hoverBackground, #2a2d2e);
  --fg:    var(--vscode-editor-foreground, #cccccc);
  --fg2:   var(--vscode-descriptionForeground, #9d9d9d);
  --fg3:   var(--vscode-disabledForeground, #5f5f5f);
  --bdr:   var(--vscode-panel-border, #424242);
  --bdr2:  var(--vscode-widget-border, #454545);
  --acc:   var(--vscode-button-background, #0078d4);
  --acc-f: var(--vscode-button-foreground, #ffffff);
  --acc-h: var(--vscode-button-hoverBackground, #026ec1);
  --foc:   var(--vscode-focusBorder, #007fd4);
  --cod:   var(--vscode-textCodeBlock-background, #0a0a0a);
  --ok:    var(--vscode-testing-iconPassed, #73c991);
  --err:   var(--vscode-testing-iconFailed, #f14c4c);
  --warn:  var(--vscode-editorWarning-foreground, #cca700);
  --user:  var(--vscode-badge-background, #1a3d5c);
  --ff:    var(--vscode-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
  --ffm:   var(--vscode-editor-font-family, "Cascadia Code", Consolas, monospace);
  --ffsz:  var(--vscode-font-size, 13px);
  /* tool accent colours */
  --tr: #e8b454; --te: #a366ff; --ts: #4ec9b0; --tg: #dcdcaa; --tw: #75beff; --ta: #569cd6;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
html, body {
  height: 100%; overflow: hidden; display: flex; flex-direction: column;
  font-family: var(--ff); font-size: var(--ffsz); background: var(--bg); color: var(--fg);
  line-height: 1.5;
}

/* ── HEADER ── */
#hdr {
  display: flex; align-items: center; gap: 6px; padding: 8px 10px;
  background: var(--bg); border-bottom: 1px solid var(--bdr); flex-shrink: 0;
  min-height: 44px;
}
#hdr-title {
  font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
  color: var(--fg2); flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
}
.hdr-btn {
  background: transparent; border: none; color: var(--fg2); cursor: pointer;
  width: 28px; height: 28px; border-radius: 5px; display: flex; align-items: center;
  justify-content: center; font-size: 15px; transition: color .15s, background .15s; flex-shrink: 0;
}
.hdr-btn:hover { color: var(--fg); background: var(--bg4) }
.hdr-btn:active { transform: scale(.93) }
#conn-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  background: var(--warn); transition: background .4s;
}
#conn-dot.ok  { background: var(--ok); box-shadow: 0 0 5px var(--ok) }
#conn-dot.err { background: var(--err) }
#conn-dot.wait { animation: dotpulse 1.6s infinite }
@keyframes dotpulse { 0%,100%{opacity:1} 50%{opacity:.25} }

/* ── SETTINGS OVERLAY ── */
#cfg-overlay {
  display: none; position: absolute; top: 44px; right: 0; left: 0; z-index: 100;
  background: var(--bg2); border-bottom: 1px solid var(--bdr);
  box-shadow: 0 6px 20px rgba(0,0,0,.35); padding: 14px 14px 16px;
}
#cfg-overlay.open { display: block }
.cfg-row { display: flex; flex-direction: column; gap: 3px; margin-bottom: 10px }
.cfg-row label { font-size: 11px; color: var(--fg2); font-weight: 500 }
.cfg-row input {
  background: var(--bg3); color: var(--fg); border: 1px solid var(--bdr2); border-radius: 4px;
  padding: 6px 9px; font-size: 12px; font-family: var(--ff); outline: none; transition: border-color .15s;
}
.cfg-row input:focus { border-color: var(--foc); box-shadow: 0 0 0 1px var(--foc) }
.cfg-row input::placeholder { color: var(--fg3) }
.cfg-footer { display: flex; gap: 8px; align-items: center; margin-top: 4px }
.cfg-select {
  flex: 1; background: var(--bg3); color: var(--fg); border: 1px solid var(--bdr2);
  border-radius: 4px; padding: 6px 9px; font-size: 12px; font-family: var(--ff); outline: none;
  appearance: none; cursor: pointer;
}
.cfg-save-btn {
  background: var(--acc); color: var(--acc-f); border: none; border-radius: 4px;
  padding: 6px 16px; font-size: 12px; cursor: pointer; font-weight: 500; transition: background .15s;
}
.cfg-save-btn:hover { background: var(--acc-h) }

/* ── SESSION PANEL ── */
#ses-overlay {
  display: none; position: absolute; top: 44px; right: 0; left: 0; z-index: 100;
  background: var(--bg2); border-bottom: 1px solid var(--bdr);
  box-shadow: 0 6px 20px rgba(0,0,0,.35); max-height: 260px; overflow-y: auto;
}
#ses-overlay.open { display: block }
#ses-overlay::-webkit-scrollbar { width: 4px }
#ses-overlay::-webkit-scrollbar-thumb { background: var(--bdr); border-radius: 2px }
.ses-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 14px; cursor: pointer;
  border-bottom: 1px solid var(--bdr); font-size: 12px; transition: background .1s;
}
.ses-item:last-child { border-bottom: none }
.ses-item:hover { background: var(--bg4) }
.ses-item.active { background: rgba(0,120,212,.12); color: var(--acc) }
.ses-item-icon { font-size: 14px; flex-shrink: 0; opacity: .7 }
.ses-item-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
.ses-item-new {
  display: flex; align-items: center; gap: 8px; padding: 10px 14px; cursor: pointer;
  border-bottom: 1px solid var(--bdr); font-size: 12px; color: var(--acc); font-weight: 500;
  transition: background .1s;
}
.ses-item-new:hover { background: var(--bg4) }

/* ── MESSAGES ── */
#msgs {
  flex: 1; overflow-y: auto; padding: 0; display: flex; flex-direction: column;
  scroll-behavior: smooth; position: relative; scrollbar-gutter: stable;
}
#msgs::-webkit-scrollbar { width: 6px }
#msgs::-webkit-scrollbar-thumb { background: var(--bdr); border-radius: 3px }
#msgs::-webkit-scrollbar-track { background: transparent }

/* ── EMPTY STATE ── */
#empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  flex: 1; padding: 32px 20px; text-align: center; color: var(--fg2);
}
.empty-icon { font-size: 36px; margin-bottom: 14px; opacity: .6 }
.empty-title { font-size: 15px; font-weight: 600; color: var(--fg); margin-bottom: 6px }
.empty-sub { font-size: 12px; line-height: 1.6; max-width: 280px; margin-bottom: 20px }
.sugs { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center }
.sugs .sug { animation: slideup .4s cubic-bezier(0.16,1,0.3,1) both }
.sugs .sug:nth-child(1){animation-delay:.05s}
.sugs .sug:nth-child(2){animation-delay:.1s}
.sugs .sug:nth-child(3){animation-delay:.15s}
.sugs .sug:nth-child(4){animation-delay:.2s}
.sugs .sug:nth-child(5){animation-delay:.25s}
.sugs .sug:nth-child(6){animation-delay:.3s}
.sug {
  background: var(--bg3); border: 1px solid var(--bdr2); color: var(--fg2);
  padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 11px; font-family: var(--ff);
  transition: all .15s cubic-bezier(0.16,1,0.3,1); white-space: nowrap;
}
.sug:hover { color: var(--fg); border-color: var(--acc); background: var(--bg4); transform: translateY(-1px) }
.sug:active { transform: translateY(0) }

/* ── TURN (message group) ── */
.turn { display: flex; flex-direction: column; padding: 12px 14px 4px; animation: slideup .25s cubic-bezier(0.16,1,0.3,1) both }
.turn + .turn { border-top: 1px solid transparent }
@keyframes slideup { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:translateY(0) } }

/* User turn */
.turn.user { align-items: flex-end; padding-bottom: 8px }
.turn.user .bubble {
  background: var(--user, #1a3d5c); border-radius: 14px 14px 3px 14px;
  padding: 9px 14px; max-width: 85%; font-size: 13px; line-height: 1.55; word-wrap: break-word;
  border: 1px solid rgba(64,165,255,.2); position: relative; overflow: hidden;
}
.turn.user .bubble::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: linear-gradient(180deg, #40a5ff 0%, var(--acc) 100%);
}
.turn.user .bubble .md { color: var(--fg) }

/* Assistant turn */
.turn.asst { padding-top: 14px; position: relative }
.turn.asst::before {
  content: ''; position: absolute; left: 14px; top: 0; bottom: 0; width: 1px;
  background: linear-gradient(180deg, transparent 0%, rgba(46,204,113,.25) 15%, rgba(46,204,113,.25) 85%, transparent 100%);
  pointer-events: none;
}
.turn-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding-left: 4px }
.av {
  width: 22px; height: 22px; border-radius: 5px; display: flex; align-items: center;
  justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0;
  background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%); color: #fff;
}
.turn-name { font-size: 12px; font-weight: 600; color: var(--fg) }
.turn-model {
  font-size: 10px; color: var(--fg3); background: var(--bg3); border: 1px solid var(--bdr2);
  padding: 1px 7px; border-radius: 10px;
}

/* ── TOOL CALLS ── */
.tools-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px }
.tool-pill {
  display: flex; align-items: center; gap: 8px; padding: 6px 10px;
  background: var(--bg3); border: 1px solid var(--bdr2); border-radius: 7px;
  font-size: 12px; cursor: pointer; user-select: none; transition: border-color .15s, background .15s, transform .1s;
  overflow: hidden;
}
.tool-pill:hover { background: var(--bg4); border-color: var(--bdr); transform: translateY(-1px) }
.tool-pill:active { transform: translateY(0) }
.tool-pill.running { border-color: rgba(255,165,0,.3) }
.tool-pill.error   { border-color: rgba(241,76,76,.3); background: rgba(241,76,76,.05) }
.tp-icon { font-size: 13px; flex-shrink: 0 }
.tp-name { font-weight: 600; flex-shrink: 0; font-size: 11px; color: var(--fg2) }
.tp-arg  { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: var(--ffm); font-size: 11px; color: var(--fg3) }
.tp-status { flex-shrink: 0; margin-left: 4px }
.tp-expand { flex-shrink: 0; color: var(--fg3); font-size: 10px; transition: transform .2s }
.tool-pill.expanded .tp-expand { transform: rotate(180deg) }
/* running spinner */
.spin { width: 12px; height: 12px; border: 2px solid var(--bg4); border-top-color: var(--warn); border-radius: 50%; animation: spin .8s linear infinite; flex-shrink: 0 }
@keyframes spin { to { transform: rotate(360deg) } }
/* pill type colours */
.tp-Read .tp-name,.tp-read .tp-name     { color: var(--tr) }
.tp-Edit .tp-name,.tp-edit .tp-name,
.tp-Write .tp-name,.tp-write .tp-name   { color: var(--te) }
.tp-Bash .tp-name,.tp-bash .tp-name     { color: var(--ts) }
.tp-Grep .tp-name,.tp-grep .tp-name     { color: var(--tg) }
.tp-WebSearch .tp-name,.tp-WebFetch .tp-name,
.tp-websearch .tp-name,.tp-webfetch .tp-name { color: var(--tw) }
.tp-Agent .tp-name,.tp-task .tp-name    { color: var(--ta) }

/* Tool expand body */
.tool-body {
  display: none; padding: 8px 10px; background: var(--cod); border: 1px solid var(--bdr2);
  border-top: none; border-radius: 0 0 7px 7px; font-family: var(--ffm); font-size: 11px;
  line-height: 1.55; max-height: 250px; overflow: auto; color: #d4d4d4;
  white-space: pre-wrap; word-wrap: break-word;
}
.tool-body::-webkit-scrollbar { width: 4px; height: 4px }
.tool-body::-webkit-scrollbar-thumb { background: var(--bdr) }
.tool-pill.expanded + .tool-body { display: block }
/* diff in body */
.da { color: #6bca9a; background: rgba(107,202,154,.1); display: block; margin: 0 -10px; padding: 0 10px }
.dr { color: #e06c75; background: rgba(224,108,117,.1); display: block; margin: 0 -10px; padding: 0 10px }
.dh { color: #569cd6; font-style: italic; display: block }
.so { color: var(--ts) } .se { color: var(--err) }

/* ── ASSISTANT BODY ── */
.abody { font-size: 13px; line-height: 1.65; word-wrap: break-word }
.abody .md p  { margin: 0 0 10px }
.abody .md p:last-child { margin-bottom: 0 }
.abody .md h1,.abody .md h2,.abody .md h3 { font-weight: 600; margin: 14px 0 6px; color: var(--fg) }
.abody .md h1 { font-size: 1.3em; border-bottom: 1px solid var(--bdr); padding-bottom: 4px }
.abody .md h2 { font-size: 1.1em }
.abody .md h3 { font-size: 1em }
.abody .md code {
  font-family: var(--ffm); font-size: 91%; background: var(--bg3); padding: 1px 5px;
  border-radius: 3px; color: var(--vscode-textPreformat-foreground, #dcdcaa);
}
.abody .md pre {
  background: var(--cod); border: 1px solid var(--bdr); border-radius: 7px;
  margin: 10px 0; overflow: hidden; position: relative;
}
.code-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 5px 10px; background: rgba(255,255,255,.03); border-bottom: 1px solid var(--bdr);
}
.code-lang { font-size: 10px; font-family: var(--ffm); color: var(--fg3) }
.abody .md pre code {
  display: block; padding: 10px; overflow-x: auto; font-size: 12px; line-height: 1.5;
  font-family: var(--ffm); color: var(--fg); background: none;
  white-space: pre;
}
.abody .md pre code::-webkit-scrollbar { height: 4px }
.abody .md pre code::-webkit-scrollbar-thumb { background: var(--bdr) }
.abody .md blockquote {
  border-left: 3px solid var(--acc); padding: 6px 12px; margin: 10px 0;
  color: var(--fg2); background: rgba(0,127,212,.07); border-radius: 0 5px 5px 0;
}
.abody .md ul,.abody .md ol { margin: 6px 0; padding-left: 22px }
.abody .md li { margin: 3px 0 }
.abody .md a { color: var(--acc); text-decoration: none }
.abody .md a:hover { text-decoration: underline }
.abody .md table { border-collapse: collapse; width: 100%; margin: 10px 0 }
.abody .md th,.abody .md td { border: 1px solid var(--bdr); padding: 5px 10px; text-align: left }
.abody .md th { background: var(--bg3); font-weight: 600 }
.abody .md hr { border: none; border-top: 1px solid var(--bdr); margin: 14px 0 }
.abody .md img { max-width: 100%; border-radius: 5px }
/* copy button */
.cpb {
  position: absolute; top: 5px; right: 7px; background: var(--bg3); border: 1px solid var(--bdr2);
  color: var(--fg2); padding: 2px 8px; border-radius: 4px; font-size: 11px; cursor: pointer;
  opacity: 0; transition: all .15s; font-family: var(--ff);
}
.abody .md pre:hover .cpb { opacity: 1 }
.cpb:hover { color: var(--fg); background: var(--bg4) }
.cpb.ok { color: var(--ok); border-color: var(--ok) }
/* streaming cursor */
.cur { display: inline-block; width: 2px; height: 14px; background: var(--acc); vertical-align: text-bottom; margin-left: 1px; animation: blink 1s step-end infinite; border-radius: 1px }
@keyframes blink { 50%{opacity:0} }
/* thinking */
.think {
  border: 1px solid rgba(0,120,212,.25); background: rgba(0,120,212,.06);
  border-radius: 7px; margin: 8px 0; overflow: hidden;
}
.think-hd {
  display: flex; align-items: center; gap: 6px; padding: 8px 12px; cursor: pointer;
  font-size: 11px; color: var(--fg2); user-select: none;
}
.think-hd:hover { color: var(--fg) }
.think-bd { padding: 0 12px 10px; font-size: 12px; color: var(--fg2); display: none }
.think.open .think-bd { display: block }
/* meta row */
.meta-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 11px; color: var(--fg3) }
/* errors */
.err-inline { background: rgba(241,76,76,.09); border: 1px solid rgba(241,76,76,.3); color: var(--err); padding: 8px 10px; border-radius: 5px; font-size: 12px; margin: 6px 0 }
/* loading dots */
.ldots { display: flex; align-items: center; gap: 4px; padding: 4px 0 }
.ldots span { width: 5px; height: 5px; background: var(--fg3); border-radius: 50%; animation: bounce 1.2s ease-in-out infinite }
.ldots span:nth-child(2){animation-delay:.2s}.ldots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}
/* turn actions */
.turn-acts { display: flex; gap: 4px; justify-content: flex-end; padding: 2px 0 6px; opacity: 0; transition: opacity .15s }
.turn:hover .turn-acts { opacity: 1 }
.act-btn {
  background: transparent; border: 1px solid transparent; color: var(--fg3); width: 26px; height: 26px;
  border-radius: 5px; display: flex; align-items: center; justify-content: center; cursor: pointer;
  font-size: 12px; transition: all .12s;
}
.act-btn:hover { color: var(--fg); border-color: var(--bdr2); background: var(--bg3) }
/* changes bar */
.chbar {
  display: flex; align-items: center; gap: 8px; margin: 4px 0 6px; padding: 7px 10px;
  background: rgba(163,102,255,.07); border: 1px solid rgba(163,102,255,.2); border-radius: 7px;
  font-size: 11px; flex-wrap: wrap; animation: slideup .3s cubic-bezier(0.16,1,0.3,1) both;
}
.chbar-info { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; flex-wrap: wrap }
.chbar-count { font-weight: 600; color: #a366ff; flex-shrink: 0 }
.chbar-files { display: flex; flex-wrap: wrap; gap: 3px }
.fchip {
  background: rgba(163,102,255,.12); border: 1px solid rgba(163,102,255,.18);
  border-radius: 3px; padding: 0 6px; font-size: 10px; color: var(--fg2); font-family: var(--ffm);
  max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: default;
  display: inline-flex; align-items: center; gap: 3px;
}
.chbar-acts { flex-shrink: 0 }
.revert-btn {
  background: linear-gradient(135deg, rgba(241,76,76,.15) 0%, rgba(241,76,76,.1) 100%);
  border: 1px solid rgba(241,76,76,.35); color: var(--err);
  padding: 3px 12px; border-radius: 4px; font-size: 11px; cursor: pointer; font-weight: 500;
  transition: all .15s; font-family: var(--ff);
}
.revert-btn:hover { background: linear-gradient(135deg, rgba(241,76,76,.28) 0%, rgba(241,76,76,.2) 100%); border-color: rgba(241,76,76,.55); transform: translateY(-1px) }
.revert-btn:active { transform: translateY(0) }
.revert-btn:disabled { opacity: .4; cursor: not-allowed; transform: none }
.chbar-done { color: var(--ok); font-weight: 500; padding: 0 4px }
/* sys message */
.sys { text-align: center; font-size: 11px; color: var(--fg3); padding: 4px 14px }

/* ── CONTEXT BADGE ── */
#ctx-badge {
  display: none; align-items: center; gap: 5px; padding: 3px 10px 0;
  font-size: 11px; color: var(--fg3); font-family: var(--ffm); flex-shrink: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
#ctx-badge.show { display: flex }
#ctx-badge-icon { font-size: 11px }

/* ── INPUT AREA ── */
#inp-wrap {
  display: flex; flex-direction: column; flex-shrink: 0;
  border-top: 1px solid var(--bdr); background: var(--bg);
}
#inp-row { display: flex; gap: 8px; padding: 8px 10px; align-items: flex-end }
#inp {
  flex: 1; background: var(--bg3); color: var(--fg); border: 1px solid var(--bdr2); border-radius: 8px;
  padding: 8px 12px; font-family: var(--ff); font-size: var(--ffsz); resize: none;
  min-height: 38px; max-height: 180px; outline: none; line-height: 1.5; transition: border-color .15s, box-shadow .15s;
}
#inp:focus { border-color: var(--foc); box-shadow: 0 0 0 1px var(--foc) }
#inp::placeholder { color: var(--fg3) }
#inp:disabled { opacity: .45 }
#snd {
  width: 34px; height: 34px; background: var(--acc); color: var(--acc-f); border: none;
  border-radius: 7px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background .15s, transform .12s cubic-bezier(0.16,1,0.3,1), box-shadow .15s; align-self: flex-end;
}
#snd:hover { background: var(--acc-h); transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,120,212,.35) }
#snd:active { transform: scale(.93) translateY(0) }
#snd:disabled { opacity: .35; cursor: not-allowed; background: var(--fg3); box-shadow: none }
#snd svg { width: 16px; height: 16px; fill: currentColor }
#inp-hint { font-size: 10px; color: var(--fg3); padding: 0 10px 5px; display: flex; gap: 10px }
kbd { background: var(--bg3); border: 1px solid var(--bdr2); border-radius: 3px; padding: 0 4px; font-size: 10px; font-family: var(--ffm) }
/* accessibility */
:focus-visible { outline: 1px solid var(--foc); outline-offset: -1px }
button:focus:not(:focus-visible) { outline: none }
#agent-sel {
  background: var(--bg3); color: var(--fg); border: 1px solid var(--bdr2); border-radius: 4px;
  font-size: 11px; padding: 2px 6px; cursor: pointer; max-width: 72px;
}
#mention-box {
  display: none; position: absolute; bottom: 100%; left: 0; right: 0; max-height: 160px;

<script>
(function () {
'use strict';

var vsc = acquireVsCodeApi();

/* ── State ── */
var S = {
  ready: false, busy: false, session: null, messages: [],
  streamTurn: null, streamAccum: '', streamTimer: null,
  sessions: [],
  defaultAgent: 'build',
};
var attachedFiles = [];
var mentionQuery = '';
var mentionIdx = 0;

var toolStore = {}; // id → tool
var turnFiles = []; // files modified this turn

/* ── DOM ── */
var $msgs   = document.getElementById('msgs');
var $inp    = document.getElementById('inp');
var $snd    = document.getElementById('snd');
var $dot    = document.getElementById('conn-dot');
var $title  = document.getElementById('hdr-title');
var $empty  = document.getElementById('empty');
var $ctxB   = document.getElementById('ctx-badge');
var $ctxT   = document.getElementById('ctx-badge-text');
var $cfgO   = document.getElementById('cfg-overlay');
var $sesO   = document.getElementById('ses-overlay');
var $sesList = document.getElementById('ses-list');

/* ── Util ── */
function esc(s) {
  var d = document.createElement('div');
  d.textContent = s == null ? '' : String(s);
  return d.innerHTML;
}
function uid()    { return (Date.now() + Math.random()).toString(36); }
function scroll(force) {
  var threshold = 120;
  var nearBottom = $msgs.scrollHeight - $msgs.scrollTop - $msgs.clientHeight < threshold;
  if (force || nearBottom) { $msgs.scrollTop = $msgs.scrollHeight; }
}
function post(m)  { vsc.postMessage(m); }

function hideEmpty() {
  if ($empty && $empty.parentNode === $msgs) {
    $msgs.removeChild($empty);
    $empty = null;
  }
}

function closeOverlays() {
  $cfgO.classList.remove('open');
  $sesO.classList.remove('open');
}

/* ── Markdown ── */
function renderMd(src) {
  if (!src) { return ''; }
  var lines = src.split('\n'), out = '', i = 0;
  while (i < lines.length) {
    var ln = lines[i];
    // Fenced code
    var fm = ln.match(/^(`{3,}|~{3,})([\w+-]*)/);
    if (fm) {
      var delim = fm[1], lang = fm[2] || '', code = []; i++;
      while (i < lines.length && !lines[i].startsWith(delim)) { code.push(lines[i]); i++; }
      i++;
      var cid = 'c' + uid();
      out += '<pre><div class="code-hdr"><span class="code-lang">' + esc(lang || 'text') + '</span>'
        + '<button class="cpb" onclick="cpCode(\'' + cid + '\',this)">Copy</button></div>'
        + '<code id="' + cid + '">' + esc(code.join('\n')) + '</code></pre>';
      continue;
    }
    // Heading
    var hm = ln.match(/^(#{1,3}) (.+)/);
    if (hm) { out += '<h' + hm[1].length + '>' + inl(hm[2]) + '</h' + hm[1].length + '>'; i++; continue; }
    // HR
    if (/^---+$/.test(ln.trim())) { out += '<hr>'; i++; continue; }
    // Blockquote
    if (ln.startsWith('> ')) {
      var bq = [];
      while (i < lines.length && lines[i].startsWith('> ')) { bq.push(lines[i].slice(2)); i++; }
      out += '<blockquote>' + renderMd(bq.join('\n')) + '</blockquote>'; continue;
    }
    // UL
    if (/^[-*+] /.test(ln)) {
      out += '<ul>';
      while (i < lines.length && /^[-*+] /.test(lines[i])) { out += '<li>' + inl(lines[i].slice(2)) + '</li>'; i++; }
      out += '</ul>'; continue;
    }
    // OL
    if (/^\d+\. /.test(ln)) {
      out += '<ol>';
      while (i < lines.length && /^\d+\. /.test(lines[i])) { out += '<li>' + inl(lines[i].replace(/^\d+\. /,'')) + '</li>'; i++; }
      out += '</ol>'; continue;
    }
    // Table
    if (ln.includes('|') && i+1 < lines.length && /^\|[-:| ]+\|/.test(lines[i+1])) {
      var cols = ln.split('|').filter(function(c){return c.trim();});
      out += '<table><thead><tr>' + cols.map(function(c){return '<th>' + inl(c.trim()) + '</th>';}).join('') + '</tr></thead><tbody>';
      i += 2;
      while (i < lines.length && lines[i].includes('|')) {
        var cells = lines[i].split('|').filter(function(c){return c.trim();});
        out += '<tr>' + cells.map(function(c){return '<td>' + inl(c.trim()) + '</td>';}).join('') + '</tr>'; i++;
      }
      out += '</tbody></table>'; continue;
    }
    // Blank line
    if (ln.trim() === '') {
      i++;
      var pr = [];
      while (i < lines.length && lines[i].trim() !== '' && !/^(#{1,3} |`{3}|~{3}|> |-[ ]|\d+\. |---+$)/.test(lines[i]) && !lines[i].includes('|')) {
        pr.push(lines[i]); i++;
      }
      if (pr.length) { out += '<p>' + inl(pr.join('\n')) + '</p>'; }
      continue;
    }
    // Paragraph
    var ps = [];
    while (i < lines.length && lines[i].trim() !== '' && !/^(#{1,3} |`{3}|~{3}|> |-[ ]|\d+\. |---+$)/.test(lines[i]) && !lines[i].includes('|')) {
      ps.push(lines[i]); i++;
    }
    if (ps.length) { out += '<p>' + inl(ps.join('\n')) + '</p>'; }
  }
  return '<div class="md">' + out + '</div>';
}

function inl(s) {
  var o = esc(s);
  o = o.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  o = o.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  o = o.replace(/__(.+?)__/g, '<strong>$1</strong>');
  o = o.replace(/\*([^*\n]+?)\*/g, '<em>$1</em>');
  o = o.replace(/_([^_\n]+?)_/g, '<em>$1</em>');
  o = o.replace(/`([^`]+)`/g, '<code>$1</code>');
  o = o.replace(/~~(.+?)~~/g, '<del>$1</del>');
  o = o.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="#" title="$2">$1</a>');
  o = o.replace(/\n/g, '<br>');
  return o;
}

window.cpCode = function(id, btn) {
  var el = document.getElementById(id);
  if (!el) { return; }
  navigator.clipboard.writeText(el.innerText).then(function() {
    var orig = btn.textContent; btn.textContent = '✓'; btn.classList.add('ok');
    setTimeout(function(){ btn.textContent = orig; btn.classList.remove('ok'); }, 1500);
  });
};

/* ── Tool icons / summary ── */
var ICONS = {
  Read:'📄', read:'📄', read_file:'📄',
  Write:'💾', write:'💾', write_file:'💾',
  Edit:'✏️', edit:'✏️', edit_file:'✏️',
  Bash:'💻', bash:'💻', shell:'💻',
  Glob:'🔍', glob:'🔍',
  Grep:'🔎', grep:'🔎',
  WebSearch:'🌐', websearch:'🌐',
  WebFetch:'🌍', webfetch:'🌍',
  Agent:'⚙️', task:'⚙️',
  TodoWrite:'✅', todo:'✅',
};
function toolIcon(n) { return ICONS[n] || '🔧'; }

function toolArg(name, input) {
  if (!input) { return ''; }
  var fp = input.file_path || input.path || input.filename;
  if (fp) { return trimPath(fp); }
  if (input.command) { return input.command.slice(0, 60); }
  if (input.pattern) { return input.pattern.slice(0, 60); }
  if (input.query) { return input.query.slice(0, 60); }
  var j = JSON.stringify(input);
  return j.length > 60 ? j.slice(0, 57) + '…' : j;
}

function trimPath(p) {
  var parts = (p || '').replace(/\\/g, '/').split('/');
  return parts.length > 3 ? '…/' + parts.slice(-2).join('/') : p;
}

function fmtOutput(name, out) {
  if (out == null) { return ''; }
  if (typeof out === 'string') {
    if (/^Edit|^edit/.test(name)) { return fmtDiff(out); }
    var s = out.length > 3000 ? out.slice(0, 3000) + '\n…(truncated)' : out;
    return esc(s);
  }
  if (typeof out === 'object') {
    if (out.stdout !== undefined || out.stderr !== undefined) {
      var r = '';
      if (out.stdout) { r += '<span class="so">' + esc(out.stdout) + '</span>'; }
      if (out.stderr) { r += '<span class="se">' + esc(out.stderr) + '</span>'; }
      return r || esc(JSON.stringify(out, null, 2));
    }
    if (Array.isArray(out)) { return esc(out.join('\n')); }
    if (out.matches) {
      return out.matches.map(function(m){ return esc(m.file||'') + ':' + esc(String(m.line||'')) + ': ' + esc(m.match||m.text||''); }).join('\n');
    }
    if (out.results) {
      return out.results.map(function(r,i){ return (i+1)+'. '+esc(r.title||r.url||'')+'\n   '+esc((r.snippet||r.content||'').slice(0,200)); }).join('\n\n');
    }
    var jj = JSON.stringify(out, null, 2);
    return esc(jj.length > 3000 ? jj.slice(0, 3000) + '\n…(truncated)' : jj);
  }
  return esc(String(out));
}

function fmtDiff(d) {
  if (!d) { return ''; }
  return d.split('\n').map(function(ln){
    if (ln.startsWith('+') && !ln.startsWith('+++')) { return '<span class="da">' + esc(ln) + '</span>'; }
    if (ln.startsWith('-') && !ln.startsWith('---')) { return '<span class="dr">' + esc(ln) + '</span>'; }
    if (ln.startsWith('@@')) { return '<span class="dh">' + esc(ln) + '</span>'; }
    return esc(ln) + '\n';
  }).join('');
}

/* ── Tool pill DOM ── */
function buildPill(tool) {
  var wrap = document.createElement('div');
  var n = tool.name || 'tool';
  var st = tool.status || 'running';
  var arg = toolArg(n, tool.input);

  var pillClass = 'tool-pill tp-' + n + (st === 'error' ? ' error' : st === 'running' ? ' running' : '');
  var stHtml = st === 'running'
    ? '<div class="spin"></div>'
    : (st === 'error' ? '<span style="color:var(--err)">✗</span>' : '<span style="color:var(--ok)">✓</span>');

  var bodyHtml = '';
  if (tool.input != null) {
    var inp = typeof tool.input === 'string' ? tool.input : JSON.stringify(tool.input, null, 2);
    bodyHtml += esc(inp.length > 2000 ? inp.slice(0,2000) + '\n…' : inp);
  }
  if (tool.output != null) {
    if (bodyHtml) { bodyHtml += '\n\n──── output ────\n'; }
    bodyHtml += fmtOutput(n, tool.output);
  }

  wrap.innerHTML =
    '<div class="' + pillClass + '" id="tp-' + esc(tool.id) + '" onclick="togglePill(\'' + esc(tool.id) + '\')">'
      + '<span class="tp-icon">' + toolIcon(n) + '</span>'
      + '<span class="tp-name">' + esc(n) + '</span>'
      + (arg ? '<span class="tp-arg">' + esc(arg) + '</span>' : '')
      + '<span class="tp-status" id="tpst-' + esc(tool.id) + '">' + stHtml + '</span>'
      + (bodyHtml ? '<span class="tp-expand">▾</span>' : '')
    + '</div>'
    + (bodyHtml ? '<div class="tool-body" id="tb-' + esc(tool.id) + '">' + bodyHtml + '</div>' : '');
  return wrap;
}

function updatePill(id, status, output) {
  var pill = document.getElementById('tp-' + id);
  var stEl = document.getElementById('tpst-' + id);
  var bodyEl = document.getElementById('tb-' + id);
  if (!pill) { return; }

  pill.classList.remove('running');
  if (status === 'error') { pill.classList.add('error'); }

  if (stEl) {
    stEl.innerHTML = status === 'error'
      ? '<span style="color:var(--err)">✗</span>'
      : '<span style="color:var(--ok)">✓</span>';
  }

  // Update body with output
  var n = (pill.className.match(/tp-(\S+)/) || [])[1] || '';
  if (output != null) {
    var outHtml = fmtOutput(n, output);
    if (bodyEl) {
      bodyEl.innerHTML += '\n──── output ────\n' + outHtml;
    } else {
      // Create body
      var newBody = document.createElement('div');
      newBody.className = 'tool-body';
      newBody.id = 'tb-' + id;
      newBody.innerHTML = outHtml;
      pill.parentNode.insertBefore(newBody, pill.nextSibling);
      // Add expand arrow to pill
      if (!pill.querySelector('.tp-expand')) {
        var arrow = document.createElement('span');
        arrow.className = 'tp-expand';
        arrow.textContent = '▾';
        pill.appendChild(arrow);
      }
    }
  }
}

window.togglePill = function(id) {
  var pill = document.getElementById('tp-' + id);
  if (!pill) { return; }
  var body = document.getElementById('tb-' + id);
  if (!body) { return; }
  pill.classList.toggle('expanded');
};

/* ── Message DOM ── */
function addSys(text) {
  var d = document.createElement('div');
  d.className = 'sys'; d.textContent = text;
  $msgs.appendChild(d); scroll();
}

function addUser(text) {
  hideEmpty();
  var t = document.createElement('div');
  t.className = 'turn user';
  t.innerHTML = '<div class="bubble">' + renderMd(text) + '</div>'
    + '<div class="turn-acts">'
    + '<button class="act-btn" title="Copy" onclick="cpTurn(this)">⎘</button>'
    + '</div>';
  $msgs.appendChild(t); scroll(true);
}

function addAsst(id, agent, model) {
  hideEmpty();
  var t = document.createElement('div');
  t.className = 'turn asst';
  t.id = 'tn-' + id;
  t.innerHTML =
    '<div class="turn-header">'
      + '<div class="av">AI</div>'
      + '<span class="turn-name">' + esc(agent || 'LocalCoder') + '</span>'
      + (model ? '<span class="turn-model">' + esc(model) + '</span>' : '')
    + '</div>'
    + '<div class="tools-list" id="tls-' + id + '"></div>'
    + '<div class="abody" id="ab-' + id + '"><div class="ldots"><span></span><span></span><span></span></div></div>'
    + '<div class="turn-acts">'
      + '<button class="act-btn" title="Copy" onclick="cpTurn(this)">⎘</button>'
      + '<button class="act-btn" title="Good" onclick="rate(this,1)">👍</button>'
      + '<button class="act-btn" title="Bad" onclick="rate(this,-1)">👎</button>'
    + '</div>';
  $msgs.appendChild(t); scroll();
  return t;
}

window.cpTurn = function(btn) {
  var turn = btn.closest('.turn');
  var el = turn.querySelector('.bubble') || turn.querySelector('.abody');
  if (!el) { return; }
  navigator.clipboard.writeText(el.innerText).then(function() {
    var orig = btn.textContent; btn.textContent = '✓';
    setTimeout(function(){ btn.textContent = orig; }, 1200);
  });
};
window.rate = function(btn, v) {
  btn.style.opacity = '1';
  btn.style.color = v > 0 ? 'var(--ok)' : 'var(--err)';
  btn.disabled = true;
};

function renderAsst(id, content, agent, model, tokens, error, tools, reasoning) {
  var turn = document.getElementById('tn-' + id);
  if (!turn) { turn = addAsst(id, agent, model); }

  if (agent) { var nm = turn.querySelector('.turn-name'); if (nm) { nm.textContent = agent; } }
  if (model) {
    var mm = turn.querySelector('.turn-model');
    if (mm) { mm.textContent = model; }
    else {
      var hd = turn.querySelector('.turn-header');
      if (hd) { var sp = document.createElement('span'); sp.className = 'turn-model'; sp.textContent = model; hd.appendChild(sp); }
    }
  }

  var tls = turn.querySelector('.tools-list');
  if (tls && tools && tools.length) {
    tls.innerHTML = '';
    tools.forEach(function(tc) { tls.appendChild(buildPill(tc)); });
  }

  var body = document.getElementById('ab-' + id);
  if (body) {
    var html = '';
    if (reasoning) {
      var th = document.createElement('div');
      th.className = 'think';
      th.innerHTML = '<div class="think-hd" onclick="this.parentElement.classList.toggle(\'open\')">'
        + '<span>🧠</span><span style="flex:1">Thinking</span><span>▾</span></div>'
        + '<div class="think-bd">' + renderMd(reasoning) + '</div>';
      body.innerHTML = '';
      body.appendChild(th);
    } else {
      body.innerHTML = '';
    }
    if (content) { body.insertAdjacentHTML('beforeend', renderMd(content)); }
    if (tokens) {
      body.insertAdjacentHTML('beforeend',
        '<div class="meta-row">🪙 ' + (tokens.input||0) + ' in · ' + (tokens.output||0) + ' out</div>');
    }
    if (error) {
      body.insertAdjacentHTML('beforeend',
        '<div class="err-inline">' + esc(typeof error === 'string' ? error : (error.message||'Error')) + '</div>');
    }
  }
  scroll();
}

/* ── Changes bar ── */
function showChangesBar(turnId, files) {
  var turn = document.getElementById('tn-' + turnId);
  if (!turn) { return; }
  var bid = 'chb-' + turnId;
  var old = document.getElementById(bid);
  if (old) { old.parentNode.removeChild(old); }

  var chips = files.map(function(f) {
    var parts = f.path.replace(/\\/g,'/').split('/');
    var label = parts.length > 2 ? '…/' + parts.slice(-2).join('/') : f.path;
    return '<span class="fchip" title="' + esc(f.path) + '">' + esc(label)
      + '<button class="fchip-btn" onclick="doRevertFile(\'' + esc(f.path).replace(/'/g, "\\'") + '\',this)" title="Revert this file">↩</button></span>';
  }).join('');

  var bar = document.createElement('div');
  bar.className = 'chbar'; bar.id = bid;
  bar.innerHTML =
    '<div class="chbar-info">'
      + '<span class="chbar-count">✏️ ' + files.length + ' file' + (files.length !== 1 ? 's' : '') + ' modified</span>'
      + '<div class="chbar-files">' + chips + '</div>'
    + '</div>'
    + '<div class="chbar-acts">'
      + '<button class="revert-btn" onclick="doRevert(\'' + bid + '\',this)">↩ Revert</button>'
    + '</div>';

  var acts = turn.querySelector('.turn-acts');
  turn.insertBefore(bar, acts ? acts.nextSibling : null);
  scroll();
}

window.doRevertFile = function(fp, btn) {
  btn.disabled = true;
  post({ type: 'undoFile', path: fp });
};

window.doRevert = function(bid, btn) {
  btn.disabled = true; btn.textContent = '…';
  post({ type: 'undoLastTurn' });
};

/* ── Session list ── */
function renderSessions() {
  $sesList.innerHTML = '';
  S.sessions.forEach(function(s) {
    var d = document.createElement('div');
    d.className = 'ses-item' + (s.id === S.session ? ' active' : '');
    d.innerHTML = '<span class="ses-item-icon">💬</span><span class="ses-item-title">' + esc((s.title||s.id).slice(0,60)) + '</span>';
    d.addEventListener('click', function() {
      closeOverlays();
      S.session = s.id; S.messages = [];
      post({ type: 'loadMessages', sessionId: s.id });
    });
    $sesList.appendChild(d);
  });
}

/* ── State ── */
function setReady(r, be) {
  S.ready = r;
  $dot.className = r ? 'ok' : 'err';
  $title.textContent = r ? 'LocalCoder · ' + (be || 'localcoder') : 'LocalCoder';
  $inp.disabled = !r; $snd.disabled = !r;
  if (r) { $dot.className = 'ok'; }
}

function setBusy(b) {
  S.busy = b;
  var si = document.getElementById('snd-icon');
  var st = document.getElementById('stop-icon');
  if (b) { si.style.display = 'none'; st.style.display = ''; $snd.title = 'Stop'; }
  else   { si.style.display = ''; st.style.display = 'none'; $snd.title = 'Send'; S.streamTurn = null; S.streamAccum = ''; if (S.streamTimer) { clearTimeout(S.streamTimer); S.streamTimer = null; } }
}

/* ── Send ── */
function doSend() {
  if (S.busy) { post({ type: 'abort' }); setBusy(false); return; }
  var text = $inp.value.trim();
  if (!text || !S.ready) { return; }
  addUser(text);
  S.messages.push({ role: 'user', content: text });
  $inp.value = ''; resizeInp();
  setBusy(true);
  var id = uid();
  S.streamTurn = id; S.streamAccum = ''; toolStore = {}; turnFiles = [];
  addAsst(id);
  var agentEl = document.getElementById('agent-sel');
  var agent = agentEl ? agentEl.value : (S.defaultAgent || 'build');
  var files = attachedFiles.slice();
  attachedFiles = [];
  post({ type: 'sendMessage', text: text, sessionId: S.session, history: S.messages.slice(0,-1), files: files, agent: agent });
}

function newSession() {
  closeOverlays();
  S.session = null; S.messages = [];
  $msgs.innerHTML = '';
  var e = document.createElement('div');
  e.id = 'empty'; e.innerHTML = $empty ? '' :
    '<div class="empty-icon">✚</div><div class="empty-title">New session</div>'
    + '<div class="empty-sub">Start a fresh conversation.</div>'
    + '<div class="sugs">'
    + '<button class="sug" data-p="Explain this file">📄 Explain file</button>'
    + '<button class="sug" data-p="Find bugs in my code">🐛 Find bugs</button>'
    + '<button class="sug" data-p="Write tests for this code">🧪 Write tests</button>'
    + '<button class="sug" data-p="Refactor this function">✨ Refactor</button>'
    + '</div>';
  if (!$empty || !$empty.parentNode) { $msgs.appendChild(e); $empty = e; wireSugs(); }
}

function resizeInp() {
  $inp.style.height = 'auto';
  var sh = $inp.scrollHeight;
  var max = 180;
  if (sh <= max) {
    $inp.style.height = sh + 'px';
    $inp.style.overflowY = 'hidden';
  } else {
    $inp.style.height = max + 'px';
    $inp.style.overflowY = 'auto';
  }
}

/* ── Message handler ── */
window.addEventListener('message', function(e) {
  var m = e.data;
  switch (m.type) {

    case 'init':
      document.getElementById('besel').value = m.backend || 'localcoder';
      toggleOpenAIFields(m.backend === 'openai');
      if (m.error) {
        setReady(false); addSys('Error: ' + m.error);
      } else {
        setReady(true, m.backend); addSys('Connected · ' + (m.backend || 'localcoder'));
      }
      if (m.config) {
        document.getElementById('cfg-ep').value  = m.config.openaiEndpoint || '';
        document.getElementById('cfg-md').value  = m.config.openaiModel || '';
        document.getElementById('cfg-key').value = m.config.openaiKey || '';
      }
      if (m.defaultAgent) { S.defaultAgent = m.defaultAgent; var ag = document.getElementById('agent-sel'); if (ag) ag.value = m.defaultAgent; }
      post({ type: 'listSessions' }); break;

    case 'configSaved': addSys('Settings saved'); closeOverlays(); break;

    case 'sessions':
      S.sessions = m.sessions || [];
      renderSessions(); break;

    case 'sessionCreated':
      S.session = m.sessionId;
      if (m.defaultAgent) { S.defaultAgent = m.defaultAgent; var ag = document.getElementById('agent-sel'); if (ag) ag.value = m.defaultAgent; }
      post({ type: 'listSessions' }); break;

    case 'messages':
      $msgs.innerHTML = ''; S.messages = []; $empty = null;
      (m.messages || []).forEach(function(msg) {
        if (msg.role === 'user') { addUser(msg.content); S.messages.push(msg); }
        else {
          var mid = msg.id || uid();
          addAsst(mid, msg.agent, msg.model);
          renderAsst(mid, msg.content, msg.agent, msg.model, msg.tokens, msg.error, msg.toolCalls, msg.reasoning);
          S.messages.push(msg);
        }
      });
      scroll(); break;

    case 'streamDelta': {
      if (!S.streamTurn) { break; }
      S.streamAccum += (m.delta || '');
      if (!S.streamTimer) {
        S.streamTimer = setTimeout(function() {
          S.streamTimer = null;
          var body = document.getElementById('ab-' + S.streamTurn);
          if (body) { body.innerHTML = renderMd(S.streamAccum) + '<span class="cur"></span>'; scroll(); }
        }, 40); // throttle to ~25fps
      }
      break;
    }

    case 'toolCall': {
      var tc = m.tool || {};
      var tcid = tc.id || ('t' + Date.now());
      toolStore[tcid] = { id: tcid, name: tc.name, input: tc.input, status: 'running' };
      // Track write tools for undo
      var WRITES = ['Edit','Write','edit','write','edit_file','write_file'];
      if (WRITES.indexOf(tc.name) >= 0 && tc.input) {
        var fp = tc.input.file_path || tc.input.path || tc.input.filename;
        if (fp && !turnFiles.some(function(f){ return f.path === fp; })) {
          turnFiles.push({ path: fp });
        }
      }
      if (S.streamTurn) {
        var tls = document.getElementById('tls-' + S.streamTurn);
        if (tls && !document.getElementById('tp-' + tcid)) {
          tls.appendChild(buildPill(toolStore[tcid]));
        }
      }
      scroll(); break;
    }

    case 'toolResult': {
      var rid = m.id;
      if (toolStore[rid]) { toolStore[rid].status = m.status; toolStore[rid].output = m.output; }
      updatePill(rid, m.status, m.output);
      scroll(); break;
    }

    case 'streamDone':
      if (S.streamTimer) { clearTimeout(S.streamTimer); S.streamTimer = null; }
      setBusy(false);
      if (S.streamTurn) {
        var sid2 = S.streamTurn;
        var msg2 = m.message || {};
        var allT = Object.values(toolStore);
        renderAsst(sid2, msg2.content || S.streamAccum, msg2.agent, msg2.model, msg2.tokens, msg2.error, allT.length ? allT : msg2.toolCalls, msg2.reasoning);
        if (m.canUndo && turnFiles.length > 0) { showChangesBar(sid2, turnFiles.slice()); }
      }
      S.messages.push({ role: 'assistant', content: S.streamAccum });
      toolStore = {}; break;

    case 'undone': {
      var bars = document.querySelectorAll('.chbar');
      if (bars.length) {
        var bar = bars[bars.length - 1];
        bar.innerHTML = '<span class="chbar-done">✓ Reverted ' + (m.count||0) + ' file' + (m.count !== 1 ? 's' : '') + '</span>';
        setTimeout(function(){ if (bar.parentNode) { bar.parentNode.removeChild(bar); } }, 2500);
      }
      break;
    }

    case 'error':
      if (S.busy) { setBusy(false); }
      if (S.streamTurn) {
        var body2 = document.getElementById('ab-' + S.streamTurn);
        if (body2) { body2.insertAdjacentHTML('beforeend', '<div class="err-inline">' + esc(m.message) + '</div>'); }
      } else {
        addSys('Error: ' + m.message);
      }
      break;

    case 'fileSuggestions': {
      var box = document.getElementById('mention-box');
      if (!box) break;
      box.innerHTML = '';
      (m.files || []).forEach(function(f, i) {
        var d = document.createElement('div');
        d.className = 'mention-item' + (i === 0 ? ' sel' : '');
        d.textContent = f.label || f.path;
        d.addEventListener('click', function() { insertMention(f.path); });
        box.appendChild(d);
      });
      box.classList.toggle('open', (m.files || []).length > 0);
      mentionIdx = 0;
      break;
    }

    case 'insertText':
      if (m.text) { $inp.value = ($inp.value ? $inp.value + ' ' : '') + m.text; resizeInp(); $inp.focus(); }
      break;

    case 'fileUndone':
      if (m.path) {
        turnFiles = turnFiles.filter(function(f){ return f.path !== m.path; });
        document.querySelectorAll('.fchip').forEach(function(el){
          if (el.title === m.path) el.parentNode && el.parentNode.removeChild(el);
        });
      }
      break;

    case 'activeFile':
      if (m.file) {
        $ctxB.classList.add('show');
        $ctxT.textContent = m.file;
        $inp.placeholder = 'Ask about ' + m.file + '…';
      } else {
        $ctxB.classList.remove('show');
        $inp.placeholder = 'Ask anything…';
      }
      break;
  }
});

/* ── UI wiring ── */
$inp.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey && !e.ctrlKey && !e.metaKey) { e.preventDefault(); doSend(); }
  if (e.key === 'Enter' && (e.ctrlKey || e.shiftKey)) {
    e.preventDefault();
    var start = this.selectionStart, end = this.selectionEnd;
    this.value = this.value.slice(0,start) + '\n' + this.value.slice(end);
    this.selectionStart = this.selectionEnd = start + 1;
    resizeInp();
  }
});
$inp.addEventListener('input', resizeInp);
$snd.addEventListener('click', doSend);

document.getElementById('btn-new').addEventListener('click', newSession);
document.getElementById('btn-new2').addEventListener('click', newSession);

document.getElementById('btn-ses').addEventListener('click', function(e) {
  e.stopPropagation();
  $cfgO.classList.remove('open');
  $sesO.classList.toggle('open');
});

document.getElementById('btn-cfg').addEventListener('click', function(e) {
  e.stopPropagation();
  $sesO.classList.remove('open');
  $cfgO.classList.toggle('open');
});

document.addEventListener('click', closeOverlays);
$cfgO.addEventListener('click', function(e) { e.stopPropagation(); });
$sesO.addEventListener('click', function(e) { e.stopPropagation(); });

function toggleOpenAIFields(show) {
  document.getElementById('openai-fields').style.display = show ? '' : 'none';
}

document.getElementById('besel').addEventListener('change', function() {
  toggleOpenAIFields(this.value === 'openai');
  post({ type: 'switchBackend', backend: this.value });
});

document.getElementById('cfg-save').addEventListener('click', function() {
  post({ type: 'setConfig', config: {
    openaiEndpoint: document.getElementById('cfg-ep').value,
    openaiModel:    document.getElementById('cfg-md').value,
    openaiKey:      document.getElementById('cfg-key').value,
  }});
});

function wireSugs() {
  document.querySelectorAll('.sug').forEach(function(btn) {
    btn.addEventListener('click', function() {
      $inp.value = btn.dataset.p || '';
      resizeInp();
      doSend();
    });
  });
}
wireSugs();


function insertMention(rel) {
  var v = .value;
  var at = v.lastIndexOf('@');
  if (at < 0) { .value = v + '@' + rel + ' '; }
  else { .value = v.slice(0, at) + '@' + rel + ' '; }
  if (!attachedFiles.some(function(f){ return f.name === rel; })) {
    attachedFiles.push({ uri: 'file:///' + rel.replace(/\\/g, '/'), mime: 'text/plain', name: rel });
  }
  var box = document.getElementById('mention-box');
  if (box) box.classList.remove('open');
  resizeInp();
  .focus();
}

.addEventListener('input', function() {
  var v = .value;
  var at = v.lastIndexOf('@');
  if (at < 0 || /\s/.test(v.slice(at + 1))) {
    var box = document.getElementById('mention-box');
    if (box) box.classList.remove('open');
    return;
  }
  post({ type: 'listFiles', query: v.slice(at + 1) });
});
/* ── Boot ── */
post({ type: 'ready' });
}());
</script>
