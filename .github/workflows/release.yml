name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

defaults:
  run:
    shell: bash

jobs:
  cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platforms: windows
            artifact: cli-windows
          - os: macos-latest
            platforms: darwin
            artifact: cli-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Set version from tag
        run: echo "LOCALCODER_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
      - name: Build CLI
        env:
          CI: true
          LOCALCODER_CHANNEL: latest
        run: |
          cd packages/localcoder
          bun run script/build.ts -- --platforms=${{ matrix.platforms }} --skip-embed-web-ui
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: packages/localcoder/dist/localcoder-*/

  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win
            artifact: desktop-windows
          - os: macos-latest
            target: mac
            artifact: desktop-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build desktop installer
        env:
          CI: true
          LOCALCODER_CHANNEL: prod
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd packages/desktop
          bun run prebuild
          bun run build
          bun run package:${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: packages/desktop/dist/localcoder-desktop-*

  npm-pack:
    needs: cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: cli-*
          merge-multiple: true
      - name: Layout dist
        run: |
          mkdir -p packages/localcoder/dist
          cp -r artifacts/localcoder-* packages/localcoder/dist/ || cp -r artifacts/*/localcoder-* packages/localcoder/dist/ 2>/dev/null || true
          ls -la packages/localcoder/dist/
      - name: Prepare npm package
        env:
          NPM_PREPARE_REGISTRY: "1"
        run: |
          cd packages/localcoder
          bun run prepare:npm
      - uses: actions/upload-artifact@v4
        with:
          name: npm-localcoder
          path: packages/localcoder/dist/npm/localcoder/
