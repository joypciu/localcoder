# Superseded by release.yml (CLI + desktop + npm). Manual runs only — do not trigger on tags.
name: Release CLI binaries

on:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platforms: windows
            artifact: windows
          - os: macos-latest
            platforms: darwin
            artifact: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Set version from tag
        run: |
          if [ -n "${{ github.ref_name }}" ] && [ "${{ github.ref_name }}" != "main" ]; then
            echo "LOCALCODER_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "LOCALCODER_VERSION=$(node -p "require('./packages/localcoder/package.json').version")" >> "$GITHUB_ENV"
          fi
      - name: Build CLI
        env:
          LOCALCODER_CHANNEL: latest
        run: |
          cd packages/localcoder
          bun run script/build.ts -- --platforms=${{ matrix.platforms }} --skip-embed-web-ui
      - uses: actions/upload-artifact@v4
        with:
          name: localcoder-${{ matrix.artifact }}
          path: packages/localcoder/dist/localcoder-*/
